name: Verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run web verification
        shell: pwsh
        run: ./scripts/test-all.ps1 -SkipDesktop

  verify-desktop:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run desktop feature verification
        shell: pwsh
        run: cargo check --no-default-features --features desktop
